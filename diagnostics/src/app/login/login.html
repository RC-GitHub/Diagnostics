<div class="auth-wrapper">
  <div class="auth-card">

    <!-- BRAND ELEMENT -->
    <div class="auth-header">
      <span class="logo-icon">🔑</span>
      <h2>Zaloguj się<span class="dot">.</span></h2>
      <p class="subtitle">Uzyskaj dostęp do dokumentacji medycznej</p>
    </div>

    <!-- ERROR BOUNDARY FRAMEWORK -->
    @if (errorMessage()) {
      <div class="alert-error" role="alert">
        <span class="alert-icon">⚠️</span>
        <span class="alert-text">{{ errorMessage() }}</span>
      </div>
    }

    <!-- SUBMISSION CONTAINER FORM -->
    <form (ngSubmit)="handleLogin()" #loginForm="ngForm" novalidate>

      <!-- EMAIL CONTAINER CONTROL -->
      <div class="form-group">
        <label for="email">Adres e-mail</label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="loginData.email"
          placeholder="nazwa@example.com"
          [disabled]="isSubmitting()"
          required />
      </div>

      <!-- PASSWORD CONTAINER CONTROL -->
      <div class="form-group">
        <label for="password">Hasło dostępu</label>
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="loginData.password"
          placeholder="••••••••"
          [disabled]="isSubmitting()"
          required />
      </div>

      <!-- ROLE CHOICE SELECTOR -->
      <div class="form-group">
        <label>Zaloguj jako</label>
        <div class="role-selector">
          <label class="radio-label" [class.checked]="loginData.role === 'patient'">
            <input
              type="radio"
              name="role"
              value="patient"
              [(ngModel)]="loginData.role"
              [disabled]="isSubmitting()" />
            <span>Pacjent</span>
          </label>

          <label class="radio-label" [class.checked]="loginData.role === 'doctor'">
            <input
              type="radio"
              name="role"
              value="doctor"
              [(ngModel)]="loginData.role"
              [disabled]="isSubmitting()" />
            <span>Lekarz</span>
          </label>
        </div>
      </div>

      <!-- SYSTEM TRANSACTION BUTTON -->
      <button type="submit" class="btn-submit" [disabled]="isSubmitting()">
        @if (isSubmitting()) {
          <span class="spinner">Uwierzytelnianie...</span>
        } @else {
          <span>Zaloguj się</span>
        }
      </button>
    </form>

    <!-- FOOTER ROUTING REDIRECTIONS -->
    <div class="auth-footer">
      <p>Nie masz jeszcze konta? <a routerLink="/register">Zarejestruj się tutaj</a></p>
    </div>

  </div>
</div>
