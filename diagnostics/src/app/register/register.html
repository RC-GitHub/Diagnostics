<div class="auth-wrapper">
  <div class="auth-card">

    <!-- BRAND ELEMENT -->
    <div class="auth-header">
      <span class="logo-icon">🩺</span>
      <h2>Utwórz konto<span class="dot">.</span></h2>
      <p class="subtitle">Dołącz do systemu Diagnostyka-App</p>
    </div>

    <!-- ERROR BOUNDARY FRAMEWORK -->
    @if (errorMessage()) {
      <div class="alert-error" role="alert">
        <span class="alert-icon">⚠️</span>
        <span class="alert-text">{{ errorMessage() }}</span>
      </div>
    }

    <!-- INTERACTIVE SUBMISSION PANEL -->
    <form (ngSubmit)="handleRegistration()" #registerForm="ngForm" novalidate>

      <!-- EMAIL INPUT CONTROL -->
      <div class="form-group">
        <label for="email">Adres e-mail</label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="registerData.email"
          placeholder="user@example.com"
          [disabled]="isSubmitting()"
          required />
      </div>

      <!-- PASSWORD INPUT CONTROL -->
      <div class="form-group">
        <label for="password">Hasło</label>
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="registerData.password"
          placeholder="Min. 8 znaków"
          [disabled]="isSubmitting()"
          required />
      </div>

      <!-- ROLE MUTATION RADIAL CONTAINER -->
      <div class="form-group">
        <label>Typ konta (Rola)</label>
        <div class="role-selector">
          <label class="radio-label" [class.checked]="registerData.role === 'patient'">
            <input
              type="radio"
              name="role"
              value="patient"
              [(ngModel)]="registerData.role"
              [disabled]="isSubmitting()" />
            <span>Pacjent</span>
          </label>

          <label class="radio-label" [class.checked]="registerData.role === 'doctor'">
            <input
              type="radio"
              name="role"
              value="doctor"
              [(ngModel)]="registerData.role"
              [disabled]="isSubmitting()" />
            <span>Lekarz</span>
          </label>
        </div>
      </div>

      <!-- CONDITIONAL DOCTOR SPECIALIZATION FRAMEWORK -->
      @if (isDoctor()) {
        <div class="form-group conditional-field">
          <label for="specialization">Specjalizacja lekarska</label>
          <input
            type="text"
            id="specialization"
            name="specialization"
            [(ngModel)]="registerData.specialization"
            placeholder="np. Cardiology, Diagnostician"
            [disabled]="isSubmitting()"
            required />
        </div>
      }

      <!-- SYSTEM TRANSACTION BUTTON -->
      <button type="submit" class="btn-submit" [disabled]="isSubmitting()">
        @if (isSubmitting()) {
          <span class="spinner">Rejestracja konta...</span>
        } @else {
          <span>Zarejestruj się</span>
        }
      </button>
    </form>

    <!-- ALTERNATIVE SCREEN ROUTING INTERFACES -->
    <div class="auth-footer">
      <p>Masz już konto? <a routerLink="/login">Zaloguj się tutaj</a></p>
    </div>

  </div>
</div>
