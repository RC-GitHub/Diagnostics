services:
  postgres_db:
    image: postgres:latest
    container_name: diagnostics_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: diagnostics_pass
      POSTGRES_DB: diagnostics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
