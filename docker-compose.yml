services:

  # ── Angular frontend (nginx) ─────────────────────────────────────────────
  frontend:
    build:
      context: ./diagnostics
      dockerfile: Dockerfile
    container_name: diagnostics_frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      postgres_db:
        condition: service_healthy

  # ── PostgreSQL database ──────────────────────────────────────────────────
  postgres_db:
    image: postgres:17-alpine
    container_name: diagnostics_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: diagnostics_pass
      POSTGRES_DB: diagnostics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d diagnostics"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
