services:

  # ── Angular frontend (nginx) ─────────────────────────────────────────────
  frontend:
    build:
      context: ./diagnostics
      dockerfile: Dockerfile
    container_name: diagnostics_frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      api:
        condition: service_healthy

  # ── Go/Gin API ────────────────────────────────────────────────────────────
  api:
    build:
      context: ../Diagnostyka-App
      dockerfile: Dockerfile
    container_name: diagnostics_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - ../Diagnostyka-App/.env
    environment:
      DB_HOST: postgres_db          # override localhost → Docker service name
    depends_on:
      postgres_db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/auth/login || true"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── PostgreSQL database ───────────────────────────────────────────────────
  postgres_db:
    image: postgres:17-alpine
    container_name: diagnostics_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: diagnostics_pass
      POSTGRES_DB: diagnostics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d diagnostics"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
